<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="Sheets-to-Image Generator — AI images from Google Sheets at scale">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#261607"/>
      <stop offset="0.55" stop-color="#854d0e"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#fcd34d" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fcd34d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="20" fill="url(#glow)"/>

  <!-- MOTIF: spreadsheet -> picture frame with sparkle -->
  <g transform="translate(980,190)" stroke="#fcd34d" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- spreadsheet grid (left) -->
    <rect x="-150" y="-50" width="100" height="100" rx="8"/>
    <line x1="-150" y1="-18" x2="-50" y2="-18"/>
    <line x1="-150" y1="16" x2="-50" y2="16"/>
    <line x1="-116" y1="-50" x2="-116" y2="50"/>
    <line x1="-84" y1="-50" x2="-84" y2="50"/>

    <!-- arrow -->
    <line x1="-34" y1="0" x2="22" y2="0"/>
    <polyline points="6,-14 22,0 6,14"/>

    <!-- picture frame (right) -->
    <rect x="40" y="-50" width="110" height="100" rx="8"/>
    <circle cx="72" cy="-18" r="11"/>
    <polyline points="48,42 84,4 110,30 128,14 142,28"/>

    <!-- sparkle -->
    <g stroke-width="5">
      <line x1="128" y1="-58" x2="128" y2="-38"/>
      <line x1="118" y1="-48" x2="138" y2="-48"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="80" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff">Sheets-to-Image</text>
  <text x="80" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff">Generator</text>
  <text x="84" y="266" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" fill="#fcd34d">AI images from a spreadsheet, at scale</text>
  <text x="84" y="312" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#fffbeb">Reads prompts from Google Sheets and writes the rendered images back.</text>
  <text x="84" y="346" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" fill="#fbbf6e">Python · Google Sheets API · SanaSprint · gradio-client · batching · retries</text>
</svg>
